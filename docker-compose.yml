version: "3.8"

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: heart_disease_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-heart_disease_db}
      MYSQL_USER: ${DB_USER:-heartuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-heartpass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    networks:
      - heart_disease_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache (optional, for caching)
  redis:
    image: redis:7-alpine
    container_name: heart_disease_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - heart_disease_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Flask Application
  web:
    build: .
    container_name: heart_disease_web
    restart: always
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-heart_disease_db}
      - DB_USER=${DB_USER:-heartuser}
      - DB_PASSWORD=${DB_PASSWORD:-heartpass}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - heart_disease_network
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: heart_disease_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    networks:
      - heart_disease_network

volumes:
  mysql_data:
    driver: local

networks:
  heart_disease_network:
    driver: bridge
